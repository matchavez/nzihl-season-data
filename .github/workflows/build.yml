name: Build season data warehouse

on:
  # Every 3 hours (tightened from once-nightly 2026-07-13, after a same-day
  # multi-game staleness risk was flagged -- see README "Schedule" section
  # below for the concrete case that motivated this and memory.md for the
  # full writeup). "30 16 * * *" is the ORIGINAL anchor slot and must stay
  # exactly where it is: it's ~04:30 NZST, deliberately before the roster
  # pipelines' 17:30 UTC run, so a same-morning "last meeting" lookup in the
  # ticker always sees last night's completed games already committed here.
  # The other 7 slots are that same anchor +3h/+6h/... around the clock --
  # purely a frequency increase, no other behavior change. A run that finds
  # no new games is still a true no-op commit (see "Commit if the deliverable
  # actually changed" below), so the extra runs don't spam commit history.
  schedule:
    - cron: "30 16 * * *"   # 04:30 NZST -- original anchor, before roster pipelines
    - cron: "30 19 * * *"   # 07:30 NZST
    - cron: "30 22 * * *"   # 10:30 NZST
    - cron: "30 1 * * *"    # 13:30 NZST
    - cron: "30 4 * * *"    # 16:30 NZST -- pre-evening-broadcast catch-up
    - cron: "30 7 * * *"    # 19:30 NZST
    - cron: "30 10 * * *"   # 22:30 NZST
    - cron: "30 13 * * *"   # 01:30 NZST
  workflow_dispatch:
    inputs:
      backfill_skaters:
        description: >-
          One-time migration (2026-07-20): re-fetch every already-committed
          game to add the `skaters` field (per-player per-game G/A, including
          scoreless games -- see derived.py's compute_player_game_logs
          docstring). Safe to re-run: already-migrated games are skipped.
          Does NOT discover new games this run.
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . pytest

      - name: Run unit tests
        run: PYTHONPATH=src python -m pytest tests/ -v

      - name: Build warehouse (both leagues, 1 fetch/sec)
        run: |
          if [ "${{ github.event.inputs.backfill_skaters }}" = "true" ]; then
            python -m nzihl_season --leagues nzihl,nzwihl --output . --sleep 1.0 --backfill-skaters | tee build.log
          else
            python -m nzihl_season --leagues nzihl,nzwihl --output . --probe-ahead 20 --sleep 1.0 | tee build.log
          fi

      - name: Commit if the deliverable actually changed
        run: |
          # cursor.json legitimately drifts on every run (see README
          # "Idempotency" -- the gameid space is shared with unrelated
          # esportsdesk customers, so scanned_through advances even when we
          # find zero new games of our own). A run that finds no new games
          # must be a true no-op commit-wise, so the decision to commit is
          # based ONLY on nzihl.json/nzwihl.json -- the actual warehouse
          # consumers fetch. If those are unchanged, discard the local
          # cursor.json drift (git checkout resets it) rather than pushing a
          # bookkeeping-only commit every single run.
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- nzihl.json nzwihl.json; then
            echo "No new games -- data unchanged, skipping commit (cursor.json progress discarded this run)."
            exit 0
          fi
          git add nzihl.json nzwihl.json cursor.json
          git commit -m "Update season data warehouse [skip ci]"
          git push
